# This is the workspace definition for the server (routerlicious) release group. See https://pnpm.io/pnpm-workspace_yaml
# for more information about the format.
#
# Guidelines for updating this file:
#
# 1. Keep the entries alphabetical wherever possible.
# 2. DO NOT end a glob with "**". E.g. "packages/**". Doing so can include unexpected packages. This is especially true
#    of packages for which we build ESM and CJS. Such packages sometimes have package.json files in their source or
#    output directories during compilation.

packages:
  - "packages/*"

onlyBuiltDependencies:
  - classic-level
  - core-js
  - node-rdkafka
  - snappy
  - unrs-resolver
  - zookeeper

# Supply chain security settings - see /DEV.md for documentation
minimumReleaseAge: 1440
resolutionMode: highest
blockExoticSubdeps: true
trustPolicy: no-downgrade
strictDepBuilds: true

overrides:
  # @typescript-eslint/*: Pin to 8.52.0 to avoid 8.53.0 which may not be available in ADO package feed.
  "@typescript-eslint/tsconfig-utils": "8.52.0"
  "@typescript-eslint/project-service": "8.52.0"

  # @babel/*: Pin to 7.27.x to avoid 7.28.x versions which may not be available in ADO package feed.
  "@babel/core": "7.27.7"
  "@babel/parser": "7.27.7"
  "@babel/code-frame": "7.27.1"
  "@babel/generator": "7.27.5"
  "@babel/helper-compilation-targets": "7.27.2"
  "@babel/helper-module-imports": "7.27.1"
  "@babel/helper-module-transforms": "7.27.3"
  "@babel/helper-string-parser": "7.27.1"
  "@babel/helper-validator-identifier": "7.27.1"
  "@babel/helpers": "7.27.6"
  "@babel/template": "7.27.2"
  "@babel/traverse": "7.27.7"
  "@babel/types": "7.27.7"
  "@babel/runtime": "7.27.6"

  # diff: overridden to patched versions to resolve a known ReDoS vulnerability.
  "diff@>=4 <5": "^4.0.4"
  "diff@>=5 <6": "^5.2.2"
  "diff@>=8 <9": "^8.0.3"

  # eslint: Force ESLint 9.x to ensure consistent version across the workspace.
  eslint: "^9.39.2"

  jws: "^3.2.3"

  # mongodb>@aws-sdk/credential-providers: not needed and brings in a large transitive dependency tree
  # (including fast-xml-parser). Dropped with '-'.
  "mongodb>@aws-sdk/credential-providers": "-"

  # oclif includes some AWS-related features, but we don't use them, so we drop those dependencies
  # with '-'. This helps reduce lockfile churn since the deps release very frequently.
  "oclif>@aws-sdk/client-cloudfront": "-"
  "oclif>@aws-sdk/client-s3": "-"

  # js-yaml: overridden to fix a known vulnerability (prototype pollution via merge keys).
  "js-yaml@<4": "^3.14.2"
  "js-yaml@>=4": "^4.1.1"

  # qs: overridden to ^6.15.0 to resolve a known vulnerability in older versions.
  qs: "^6.15.0"

  # simple-git: overridden to ^3.32.3 to resolve a CG alert.
  simple-git: "^3.32.3"

  # systeminformation: overridden to ^5.31.0 to resolve command injection vulnerabilities.
  systeminformation: "^5.31.0"

  # tar: overridden to ^7.5.11 to resolve multiple security vulnerabilities in tar 6.x (EOL, no
  # backport).
  tar: "^7.5.11"

  socket.io-parser: "^4.2.6"

  # zookeeper: pinned to 7.x since earlier versions fail to compile and may be brought in transitively.
  zookeeper: "^7.2.0"

  # minimatch: overridden to patched versions to resolve known security vulnerabilities across all
  # major version ranges.
  "minimatch@>=3 <4": "^3.1.5"
  "minimatch@>=5 <6": "^5.1.9"
  "minimatch@>=6 <7": "^6.2.3"
  "minimatch@>=7 <8": "^7.4.9"
  "minimatch@>=8 <9": "^8.0.7"
  "minimatch@>=9 <10": "^9.0.9"
  "minimatch@>=10 <11": "^10.2.4"

  # serialize-javascript: overridden to ^7.0.4 to resolve GHSA-5c6j-r48x-rmvq. No 6.x fix exists;
  # 7.x is API-compatible (only drops Node <20 support).
  "serialize-javascript@>=6 <7": "^7.0.4"

  # express: overridden to ^4.22.1 to resolve a known vulnerability in express 4.21.2.
  "express@>=4 <5": "^4.22.1"

  # picomatch: overridden to patched versions to resolve a known security vulnerability.
  "picomatch@>=2 <3": "^2.3.2"
  "picomatch@>=4 <5": "^4.0.4"
