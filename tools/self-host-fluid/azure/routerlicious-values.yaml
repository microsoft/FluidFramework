# Helm values for the routerlicious chart, full-stack on AKS.
# Replace <ACR> with your ACR resource name (for example, myregistry; do not include
# .azurecr.io) and <IMAGE_TAG> with the unique immutable release tag created in README
# Phase 1. The image is built from source and pushed to ACR.
#
# The tenant key (PLACEHOLDER_KEY) is injected at install time via --set-string -- never
# commit a real key. This is a REFERENCE shortcut: the current chart renders the key into a
# ConfigMap and retains it in Helm release metadata, while the CLI can expose it in shell
# history. Production must replace this chart path with secret injection and key rotation.
# Install only from the rendered copy created in azure/README.md:
#   key=$(openssl rand -hex 32)
#   helm install fluid "$FLUID_ROOT/server/routerlicious/kubernetes/routerlicious" \
#     -f "$DEPLOY_DIR/routerlicious-values.yaml" \
#     --set-string "alfred.key=$key"  --set-string "nexus.key=$key" \
#     --set-string "alfred.tenants[0].key=$key" --set-string "nexus.tenants[0].key=$key" \
#     --set-string "riddler.tenants[0].key=$key"
#
# mongodb below points at the in-cluster mongo (backends.yaml). For managed Cosmos DB for
# MongoDB (vCore) instead, set operationsDbEndpoint to the Cosmos connection string and
# directConnection: false.
#
# alfred.local / nexus.local below are placeholders. The validated client supplies separate
# alfred, nexus, and historian endpoints directly. The referenced chart does not map
# nexus.externalUrl to worker.deltaStreamUrl, so do not enable discovery for separate public
# endpoints until that chart gap is fixed and validated. Never commit live IPs or credentials.
image: <ACR>.azurecr.io/routerlicious:<IMAGE_TAG>
imagePullPolicy: IfNotPresent

# The upstream chart always renders alfred/nexus Ingress objects. The validated reference uses
# explicit LoadBalancer Services instead, so assign a class with no installed controller. A
# production ingress design must replace this value and supply real hosts/TLS secrets.
ingress:
  class: selfhost-reference-disabled

alfred:
  replicas: 1
  key: PLACEHOLDER_KEY
  host: alfred.local
  externalUrl: http://alfred.local
  api:
    patchRoot: true
  tenants:
    - _id: fluid
      key: PLACEHOLDER_KEY

nexus:
  replicas: 1
  key: PLACEHOLDER_KEY
  host: nexus.local
  externalUrl: http://nexus.local
  tenants:
    - _id: fluid
      key: PLACEHOLDER_KEY

deli:
  replicas: 1
scriptorium:
  replicas: 1
scribe:
  replicas: 1

riddler:
  replicas: 1
  tenants:
    - _id: fluid
      key: PLACEHOLDER_KEY
      storage:
        url: http://gitrest
        historianUrl: http://historian
        internalHistorianUrl: http://historian
        owner: fluid
        repository: fluid

storage:
  storageUrl: http://gitrest
  # This records the mode exercised by the Azure reference deployment. The
  # incremental-summary 404 remains open; changing it requires the validation
  # listed in README "Production hardening".
  enableWholeSummaryUpload: false

historian:
  externalUrl: http://historian
  internalUrl: http://historian

mongodb:
  operationsDbEndpoint: mongodb://mongo:27017
  directConnection: true

kafka:
  url: redpanda:9092

zookeeper:
  url: ""

redis:
  url: redis
  port: 6379
  tls: false
  password: ""
redis2:
  url: redis
  port: 6379
  tls: false
  password: ""
redisForThrottling:
  url: redis
  port: 6379
  tls: false
  password: ""
redisForTenantCache:
  url: redis
  port: 6379
  tls: false
  password: ""
