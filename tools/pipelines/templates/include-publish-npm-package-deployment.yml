# include-publish-npm-package-deployment

parameters:
- name: feedKind
  type: string

- name: feedUrl
  type: string

- name: environment
  type: string

- name: pool
  type: object
  default: Small-eastus2

- name: customEndPoint
  type: string
  default:

- name: tagName
  type: string
  default:

jobs:
# Note: must be kept in sync with the name of the dependsOn job below
- deployment: publish_${{ replace(parameters.environment, '-', '_') }}
  displayName: Publish ${{ parameters.environment }}
  pool: ${{ parameters.pool }}
  environment: ${{ parameters.environment }}
  workspace:
    clean: all
  variables:
    version: $[ stageDependencies.build.build.outputs['SetVersion.version']]
    isLatest: $[ stageDependencies.build.build.outputs['SetVersion.isLatest']]
  templateContext:
    type: releaseJob
    # in() returns true if the first parameter is equal to any of the others
    isProduction: ${{ in(variables['release'], 'release', 'prerelease')  }}

    # This 'inputs' section downloads initial required artifacts/data for this job.
    inputs:
      - input: pipelineArtifact
        pipeline: buildTools-resource
        artifactName: pack
        targetPath: $(Pipeline.Workspace)/buildTools-zip

      - input: pipelineArtifact
        artifactName: pack
        buildType: current
        targetPath: $(Pipeline.Workspace)/pack
  strategy:
    runOnce:
        deploy:
          steps:
          - template: /tools/pipelines/templates/include-use-node-version.yml@self

          # The build-tools pack artifact includes a package.json and pnpm-lock.yaml generated alongside the tarballs.
          # Install from those files with --frozen-lockfile so publish jobs reuse the dependency resolution produced by
          # the build-tools build instead of resolving transitive dependencies from npm during publish.
          - task: Bash@3
            name: VerifyBuildToolsInstallInputs
            displayName: Verify build-tools install lockfile
            inputs:
              targetType: 'inline'
              workingDirectory: '$(Pipeline.Workspace)/buildTools-zip/tarballs'
              script: |
                set -eu -o pipefail
                test -f package.json
                test -f pnpm-lock.yaml
                ls ./*.tgz > /dev/null
                echo "Using build-tools install package.json:"
                cat package.json

          - template: /tools/pipelines/templates/include-install-pnpm.yml@self
            parameters:
              buildDirectory: buildTools-zip/tarballs
              enableCache: false

          - task: Bash@3
            name: InstallBuildToolsFromTarball
            displayName: Install Fluid Build Tools from artifact tarball
            inputs:
              targetType: 'inline'
              workingDirectory: '$(Pipeline.Workspace)/buildTools-zip/tarballs'
              script: |
                set -eu -o pipefail
                echo "Listing files in directory: $(pwd)"
                ls -la
                pnpm --version

                echo "Installing build tools from artifact lockfile"
                pnpm install --frozen-lockfile

                # Add the local node_modules/.bin to PATH for subsequent pipeline steps
                BIN_DIR="$(pwd)/node_modules/.bin"
                echo "Adding $BIN_DIR to PATH for subsequent steps"
                echo "##vso[task.prependpath]$BIN_DIR"

                # Verify the tools are available
                if [ -d "$BIN_DIR" ]; then
                  echo "Installed binaries:"
                  ls -la "$BIN_DIR"
                else
                  echo "Error: $BIN_DIR does not exist; expected installed binaries to be present."
                  exit 1
                fi

          # TEMPORARY TEST ONLY: stop after validating the deterministic build-tools install.
          # The publish and tag steps are intentionally removed in this branch so publish pipeline
          # stages can run without pushing packages to any feed or creating release tags.
          - task: Bash@3
            displayName: Skip package publish for deterministic install test
            inputs:
              targetType: 'inline'
              script: |
                set -eu -o pipefail
                echo "Skipping package publish and release tagging in this test branch."
