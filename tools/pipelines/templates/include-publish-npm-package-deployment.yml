# include-publish-npm-package-deployment

parameters:
- name: feedUrl
  type: string

- name: feedKind
  type: string

- name: environment
  type: string

- name: pool
  type: object
  default: Small-eastus2

- name: customEndPoint
  type: string
  default:

- name: tagName
  type: string
  default:

- name: buildToolsVersionToInstall
  type: string
  default: "^0.55.0"

- name: packageManager
  type: string
  default: npm

- name: packageManagerInstallCommand
  type: string
  default: 'npm ci --unsafe-perm'

# Indicates the type of release (if any)
- name: release
  type: string
  default: ''

jobs:
- deployment: publish_${{ replace(parameters.environment, '-', '_') }}
  displayName: Publish ${{ parameters.environment }}
  pool: ${{ parameters.pool }}
  environment: ${{ parameters.environment }}
  workspace:
    clean: all
  variables:
    - group: ado-feeds
    - name: version
      value: $[ stageDependencies.build.build.outputs['SetVersion.version']]
    - name: release
      value: ${{ parameters.release }}
    - name: isLatest
      value: $[ stageDependencies.build.build.outputs['SetVersion.isLatest']]
  templateContext:
    type: releaseJob
    # in() returns true if the first parameter is equal to any of the others
    isProduction: ${{ in(variables['release'], 'release', 'prerelease')  }}

    # This 'inputs' section downloads initial required artifacts/data for this job.
    inputs:
      - input: pipelineArtifact
        artifactName: pack
        buildType: current
        targetPath: $(Pipeline.Workspace)/pack
  strategy:
    runOnce:
        deploy:
          steps:
          - template: /tools/pipelines/templates/include-use-node-version.yml@self

          # We can use this step for two things:
          # - Pin pnpm to a specific version (usually keep it in line with the one we use in the package.json files
          #   in the repo), to prevent breaks in a freshly release version from affecting us (like 10.31 did).
          # - Add overrides that might be necessary to allow for a correct installation of build-tools
          #   from the tarball artifacts produced by the build stage.
          #   Since this is a lockfile-less install (ideally we should figure out how to change that),
          #   overrides is one recourse when a dependency releases a new version that causes build-tools installation to break.
          # Note that this step needs to run before we install + configure pnpm so the package.json with overrides
          # is in place before we install/activate pnpm, or we try to install the packages from the tarballs.
          # Current overrides:
          # - Build-tools packages: map all versions to local tarballs so interdependencies resolve correctly.
          - task: Bash@3
            name: CreatePackageJsonForOverrides
            displayName: Create package.json with pnpm overrides
            inputs:
              targetType: 'inline'
              workingDirectory: '$(Pipeline.Workspace)/buildTools-zip/tarballs'
              script: |
                set -eu -o pipefail
                echo "Creating package.json with npm overrides"

                # Manual overrides - add new entries here as needed, using same syntax supported by the pnpm overrides field
                manual_overrides='{}'
                # Build overrides for local tarballs so interdependencies resolve correctly
                tarball_overrides='{}'
                for tgz in *.tgz; do
                  # Extract package.json from tarball and get the package name
                  pkg_name=$(tar -xzf "$tgz" --to-stdout package/package.json | jq -r '.name')
                  echo "Adding override for $pkg_name -> file:$tgz"
                  tarball_overrides=$(echo "$tarball_overrides" | jq --arg name "$pkg_name" --arg file "file:$tgz" '. + {($name): $file}')
                done

                # Merge manual overrides with tarball overrides and create package.json
                jq -n \
                  --argjson manual "$manual_overrides" \
                  --argjson tarballs "$tarball_overrides" \
                  '{
                    "name": "build-tools-install",
                    "packageManager": "pnpm@10.33.0+sha512.10568bb4a6afb58c9eb3630da90cc9516417abebd3fabbe6739f0ae795728da1491e9db5a544c76ad8eb7570f5c4bb3d6c637b2cb41bfdcdb47fa823c8649319",
                    "pnpm": {
                      "overrides": ($manual + $tarballs)
                    }
                  }' > package.json

                cat package.json

          - template: /tools/pipelines/templates/include-install-pnpm.yml@self
            parameters:
              buildDirectory: buildTools-zip/tarballs
              enableCache: false

          - task: Bash@3
            name: InstallBuildTools
            displayName: Install Fluid Build Tools (from npm)
            inputs:
              targetType: 'inline'
              workingDirectory: .
              script: |
                echo "installing version @${{ parameters.buildToolsVersionToInstall }}"

                npm install --global "@fluid-tools/build-cli@${{ parameters.buildToolsVersionToInstall }}"

                # This can be removed once all builds tools are moved to the build-cli library
                npm install --global "@fluidframework/build-tools@${{ parameters.buildToolsVersionToInstall }}"

          - template: /tools/pipelines/templates/include-publish-npm-package-steps.yml@self
            parameters:
              artifactPath: tarballs
              feedUrl: ${{ parameters.feedUrl }}
              customEndPoint: ${{ parameters.customEndPoint }}
              feedKind: ${{ parameters.feedKind }}

- job: TagRelease
  displayName: Tag Release
  # Note: must be kept in sync with the name of the deployment job above
  dependsOn: publish_${{ replace(parameters.environment, '-', '_') }}
  # Only tag the repo if a tag name is provided.
  condition: and(succeeded(), ne('${{ parameters.tagName }}', ''))
  variables:
    version: $[ stageDependencies.build.build.outputs['SetVersion.version']]
  steps:
  - checkout: self
    clean: true
  - template: /tools/pipelines/templates/include-git-tag-steps.yml@self
    parameters:
      tagName: ${{ parameters.tagName }}

