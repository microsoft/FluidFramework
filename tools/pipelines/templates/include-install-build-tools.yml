# include-install-build-tools
#
# This template can be included in pipelines to install the Fluid build-tools globally so flub can be used in the
# pipeline.
# Note that the preferred pattern for using the build tools is to declare a dev dependency on them, and just use that version.
# Using this template is discouraged as it is introducing another dependency mechanism into the pipeline,
# Can cause complications with the global pnpm installs overriding each other, and in slower than simply using a pre-build dev dependency.
# Additionally, using this template requires triggering the pipeline for any changes to build tools or we risk breaking the pipeline.

parameters:
- name: buildDirectory
  type: string

# The version of the build tools to install, or "repo" to install the one from the repository.
# If "repo" is selected, this includes a global install of whatever version of pnpm build-tools uses,
# which can overwrite an already installed version (like the one used by the package/release-group being built).
# If anything except "repo" is selected, this results in a lock-less install, which could pull in untested
# and un-audited versions of the many dependencies of build-tools.
- name: buildToolsVersionToInstall
  type: string
  default: repo

# The path to the pnpm store.
- name: pnpmStorePath
  type: string
  default: $(Pipeline.Workspace)/.pnpm-store

steps:
  # These steps should ONLY run if we're using the repo version of the build tools. These steps are mutually exclusive
  # with the next group of steps.
  - ${{ if eq(parameters.buildToolsVersionToInstall, 'repo') }}:
    - template: /tools/pipelines/templates/include-install-pnpm.yml@self
      parameters:
        buildDirectory: $(FluidFrameworkDirectory)/build-tools
        pnpmStorePath: ${{ parameters.pnpmStorePath }}
        enableCache: false

    - task: Bash@3
      name: InstallBuildTools
      displayName: Install Fluid Build Tools (from repo)
      inputs:
        targetType: 'inline'
        workingDirectory: $(Pipeline.Workspace)/$(FluidFrameworkDirectory)/build-tools
        script: |
          set -eu -o pipefail
          pnpm i --frozen-lockfile
          pnpm build:compile
          cd packages/build-cli
          # Use npm link instead of pnpm link because it handles bins better
          npm link
          echo "which flub: $(which flub)"

  # These steps install a version of build-tools from the npm registry. As noted above, these steps are mutually exclusive
  # with the previous group of steps.
  - ${{ if ne(parameters.buildToolsVersionToInstall, 'repo') }}:
    - task: Bash@3
      name: InstallBuildTools
      displayName: Install Fluid Build Tools (from npm)
      inputs:
        targetType: 'inline'
        workingDirectory: $(Pipeline.Workspace)/${{ parameters.buildDirectory }}
        script: |
          set -eu -o pipefail
          echo "${{ parameters.buildToolsVersionToInstall }}"
          npm install --global "@fluid-tools/build-cli@${{ parameters.buildToolsVersionToInstall }}"

  - task: Bash@3
    name: BuildToolsInstallCheck
    displayName: Check Build Tools Installation
    inputs:
      targetType: 'inline'
      workingDirectory: $(Pipeline.Workspace)/${{ parameters.buildDirectory }}
      script: |
        set -eu -o pipefail
        # Output the help and full command list for debugging purposes
        echo "which flub: $(which flub)"
        flub --help
        flub commands
