# include-install-pnpm
#
# This template can be included in pipelines to install pnpm with store caching enabled.

parameters:
# The path containing the project(s) to build.
- name: buildDirectory
  type: string

# If set to false, the pnpm store will not be cached or restored from cache.
- name: enableCache
  type: boolean
  default: true

# The path to the pnpm store. The contents here will be cached and restored when using pnpm in a pipeline.
- name: pnpmStorePath
  type: string
  default: $(Pipeline.Workspace)/.pnpm-store

# Where to place the user-level .npmrc file. Pnpm will be configured to reference this file for the duration of the job.
# Rather than rely on the default $HOME/.npmrc, we specify a known-reasonable location here.
# Users of the template probably don't need to change this.
- name: userNpmrcPath
  type: string
  default: $(Agent.TempDirectory)/.npmrc

- name: primaryRegistry
  type: string
  default: $(ado-feeds-primary-registry)

# An optional extra segment appended to the pnpm store cache key (separated by |).
# Note that Azure pipelines interpret unquoted cache keys as files rather than literal strings. E.g. the following specification:
#
# additionalCacheKey: 'foo | "bar"'
#
# will use the hashed contents of the file "foo" (hashing nothing if that file does not exist) as well as the string "bar".
# Use this parameter if the set of dependencies to be installed may be be better distinguished using files other than the root pnpm-lock.
- name: additionalCacheKey
  type: string
  default: ''

# When true (default), pnpm is installed via corepack using the version declared in package.json's
# "packageManager" field. Corepack fetches pnpm directly from https://registry.npmjs.org/ and does
# not honor an alternate npm registry (see
# https://github.com/nodejs/corepack/blob/bc13d40037d0b1bfd386e260ae741f55505b5c7c/sources/npmRegistryUtils.ts#L32),
# so this requires the agent to have outbound network access to the public npm registry.
#
# Set to false on agent pools that block egress to registry.npmjs.org (e.g. some restricted 1ES
# pools). In that mode pnpm is installed via `npm install -g pnpm@<version>` against the configured
# (authenticated) primaryRegistry instead — the same version pinned in package.json's
# "packageManager" field is used.
- name: useCorepack
  type: boolean
  default: true

steps:
- ${{ if eq(parameters.enableCache, true) }}:
  - task: Cache@2
    displayName: Cache pnpm store
    # The timeout applies to both the pre-job restore and post-job save operations.
    # 3 minutes was insufficient for the post-job cache upload of the pnpm store, causing
    # intermittent "The task has timed out" errors that mark builds as Partially Succeeded.
    timeoutInMinutes: 5
    continueOnError: true
    inputs:
      # Caches are already scoped to individual pipelines, so no need to include the release group name or tag
      # in the cache key
      ${{ if ne(parameters.additionalCacheKey, '') }}:
        key: '"pnpm-store" | "$(Agent.OS)" | $(Pipeline.Workspace)/${{ parameters.buildDirectory }}/pnpm-lock.yaml | ${{ parameters.additionalCacheKey }}'
      ${{ else }}:
        key: '"pnpm-store" | "$(Agent.OS)" | $(Pipeline.Workspace)/${{ parameters.buildDirectory }}/pnpm-lock.yaml'
      path: ${{ parameters.pnpmStorePath }}
      restoreKeys: |
        "pnpm-store" | "$(Agent.OS)"

# Seed the userconfig .npmrc with the primary registry. This propagates to subsequent tasks so
# that npmAuthenticate (below) and any later pnpm/npm invocation in the job reuse the same file.
- task: Bash@3
  displayName: Configure npm registry
  # The previous task (cache restoration) can timeout, which is classified as canceled, but since it's just cache
  # restoration, we want to continue even if it timed out.
  condition: or(succeeded(), canceled())
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Pipeline.Workspace)/${{ parameters.buildDirectory }}'
    script: |
      set -eu -o pipefail
      echo "Using node $(node --version)"
      echo "##vso[task.setvariable variable=NPM_CONFIG_USERCONFIG]$NPM_CONFIG_USERCONFIG"
      echo "registry=${NPM_REGISTRY}" > "$NPM_CONFIG_USERCONFIG"
      if [ "${NPM_REGISTRY}" == "https://registry.npmjs.org/" ]; then
        echo "##vso[task.setvariable variable=registryType]public"
      else
        echo "##vso[task.setvariable variable=registryType]private"
      fi
  env:
    NPM_REGISTRY: ${{ parameters.primaryRegistry }}
    NPM_CONFIG_USERCONFIG: ${{ parameters.userNpmrcPath }}

# Authenticate to the npm feed if required. Runs before pnpm install so that, when useCorepack
# is false, `npm install -g pnpm@<version>` can fetch pnpm itself from the authenticated feed.
- task: npmAuthenticate@0
  displayName: 'Npm authenticate'
  condition: and(succeeded(), eq(variables['registryType'], 'private'))
  retryCountOnTaskFailure: 1
  inputs:
    workingFile: ${{ parameters.userNpmrcPath }}

# Install pnpm. Only this step differs between the corepack and npm-install paths; the
# surrounding registry/auth/config steps are shared.
- ${{ if eq(parameters.useCorepack, true) }}:
  - task: Bash@3
    displayName: Install pnpm (corepack)
    inputs:
      targetType: 'inline'
      workingDirectory: '$(Pipeline.Workspace)/${{ parameters.buildDirectory }}'
      script: |
        set -eu -o pipefail
        sudo corepack enable
        echo "Using pnpm $(pnpm -v)"
- ${{ else }}:
  - task: Bash@3
    displayName: Install pnpm (npm install -g)
    inputs:
      targetType: 'inline'
      workingDirectory: '$(Pipeline.Workspace)/${{ parameters.buildDirectory }}'
      script: |
        set -eu -o pipefail
        # Parse the pnpm version pinned in package.json's "packageManager" field
        # (e.g. "pnpm@10.33.0+sha512..." -> "pnpm@10.33.0").
        PNPM_VERSION=$(node -e "const p=require('./package.json');console.log(p.packageManager.split('+')[0])")
        npm install -g "$PNPM_VERSION" --userconfig "${{ parameters.userNpmrcPath }}"
        echo "Using pnpm $(pnpm -v)"

# Configure pnpm: store directory, and use the CPU core count for workspace concurrency (better
# than the default of 4 for larger agents).
- task: Bash@3
  displayName: Configure pnpm
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Pipeline.Workspace)/${{ parameters.buildDirectory }}'
    script: |
      set -eu -o pipefail
      echo "Pnpm user config location: $(pnpm config get userconfig)"
      pnpm config set store-dir ${{ parameters.pnpmStorePath }}
      echo "Pnpm store: ${{ parameters.pnpmStorePath }}"
      pnpm config set -g workspace-concurrency 0
