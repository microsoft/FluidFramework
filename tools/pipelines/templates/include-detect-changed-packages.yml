# include-detect-changed-packages
#
# Thin pipeline wrapper around scripts/detect_changed_packages.py. The
# detection logic lives in the Python module (extracted in response to PR
# review feedback so it can be run/debugged locally and covered by unit tests
# under scripts/test/). Keeping this template minimal ensures the template
# itself doesn't drift from the tested script.
#
# Output variables (from the `setChangedPackages` step):
#   - shouldRunTests    "true" | "false"  — whether any test work is needed
#   - scopedPnpmFilter  The pnpm filter string ("...[<sha>]") when scoping is
#                       active, or an empty string when a full test run is
#                       required. Downstream jobs pass this into
#                       `npm_config_filter` verbatim; pnpm treats an empty
#                       value as "no filter applied" so recursive `-r` runs
#                       fall back to the historical every-package behavior.
#
# On any error path (missing merge-base, unsupported ref format) the script
# degrades safely to a full-run outcome, never to a silent skip.
#
# The script is invoked via `python3` directly — Python 3 ships on ADO Linux
# agent images, and this script uses only stdlib, so the gate stays close to
# "git + python" fast (no pnpm or node install step required here).

parameters:
- name: buildDirectory
  type: string

- name: targetBranchName
  type: string

steps:
  - checkout: self
    path: $(FluidFrameworkDirectory)
    clean: true
    # Shallow clone; the script unshallows on demand if the merge-base
    # can't be resolved within this depth. Most PRs merge-base within a
    # few hundred commits, so this is cheap in the common case.
    fetchDepth: 200

  - task: Bash@3
    name: setChangedPackages
    displayName: Detect changed packages
    env:
      TARGET_BRANCH: ${{ parameters.targetBranchName }}
    inputs:
      targetType: inline
      workingDirectory: '$(Pipeline.Workspace)/${{ parameters.buildDirectory }}'
      script: |
        set -eu -o pipefail
        python3 scripts/detect_changed_packages.py
