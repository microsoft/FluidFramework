# Pipeline wrapper around scripts/detect_changed_packages.py. The Python
# module owns the decision logic and its own docstring; see that file for
# output-variable semantics, safe-fallback policy, and full-run patterns.
# Python 3 stdlib only, so no install step is needed here.

parameters:
- name: buildDirectory
  type: string

- name: targetBranchName
  type: string

steps:
  - checkout: self
    path: $(FluidFrameworkDirectory)
    clean: true
    # Shallow clone; the script deepens on demand if the merge-base falls
    # outside this depth. Most PRs merge-base within a few hundred commits.
    fetchDepth: 200

  - task: Bash@3
    name: setChangedPackages
    displayName: Detect changed packages
    env:
      TARGET_BRANCH: ${{ parameters.targetBranchName }}
    inputs:
      targetType: inline
      workingDirectory: '$(Pipeline.Workspace)/${{ parameters.buildDirectory }}'
      script: |
        set -eu -o pipefail
        python3 scripts/detect_changed_packages.py
