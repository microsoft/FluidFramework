# include-task-test template to run a single task test with/without coverage

parameters:
- name: taskTestStep
  type: string

- name: buildDirectory
  type: string

- name: testCoverage
  type: boolean
  default: false

# Optional pnpm filter expression (e.g. "...[<sha>]"). When non-empty, it is
# set as `npm_config_filter` so pnpm scopes the recursive run to the listed
# packages plus their dependents. Empty means "no filter" — pnpm falls back
# to running across every workspace package (the historical behavior).
- name: pnpmFilter
  type: string
  default: ''

steps:
# Test - With coverage
- ${{ if and(parameters.testCoverage, startsWith(parameters.taskTestStep, 'ci:test')) }}:
  - task: Npm@1
    displayName: npm run ${{ parameters.taskTestStep }}:coverage
    inputs:
      command: 'custom'
      workingDir: $(Pipeline.Workspace)/${{ parameters.buildDirectory }}
      customCommand: 'run ${{ parameters.taskTestStep }}:coverage'
    condition: and(succeededOrFailed(), eq(variables['startTest'], 'true'))
    env:
      # Only emit npm_config_filter when a filter is actually set. pnpm 10
      # happens to treat an empty value the same as unset, but the conditional
      # keeps the contract explicit and avoids relying on that behavior.
      ${{ if ne(parameters.pnpmFilter, '') }}:
        npm_config_filter: ${{ parameters.pnpmFilter }}
      # Tests can use this environment variable to behave differently when running from a test branch
      ${{ if contains(parameters.taskTestStep, 'tinylicious') }}:
        # Disable colorization for tinylicious logs (not useful when printing to a file)
        logger__colorize: "false" # Need to pass it as string so ADO doesn't convert it into False (capital F) which doesn't work
        logger__morganFormat: tiny

# Test - No coverage
- ${{ else }}:
  - task: Npm@1
    displayName: npm run ${{ parameters.taskTestStep }}
    inputs:
      command: 'custom'
      workingDir: $(Pipeline.Workspace)/${{ parameters.buildDirectory }}
      customCommand: 'run ${{ parameters.taskTestStep }}'
    condition: and(succeededOrFailed(), eq(variables['startTest'], 'true'))
    env:
      # Only emit npm_config_filter when a filter is actually set. pnpm 10
      # happens to treat an empty value the same as unset, but the conditional
      # keeps the contract explicit and avoids relying on that behavior.
      ${{ if ne(parameters.pnpmFilter, '') }}:
        npm_config_filter: ${{ parameters.pnpmFilter }}
      # Tests can use this environment variable to behave differently when running from a test branch
      ${{ if contains(parameters.taskTestStep, 'tinylicious') }}:
        # Disable colorization for tinylicious logs (not useful when printing to a file)
        logger__colorize: "false" # Need to pass it as string so ADO doesn't convert it into False (capital F) which doesn't work
        logger__morganFormat: tiny
