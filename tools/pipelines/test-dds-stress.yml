# "Test - DDS Stress" pipeline

name: $(Build.BuildId)

trigger: none
pr: none

resources:
  pipelines:
  - pipeline: client   # Name of the pipeline resource
    source: Build - client packages
    branch: main # Default branch for manual/scheduled triggers if none is selected
    trigger:
      branches:
      - release/*
      - main
      - next
  repositories:
  - repository: ff_pipeline_host
    type: git
    name: ff_pipeline_host


variables:
- template: /tools/pipelines/templates/include-vars-telemetry-generator.yml@self
# This is a test pipeline, not a build one, so we don't need to run CodeQL tasks
# Note that using this variable only works for non-1ES-template pipelines.
- name: Codeql.SkipTaskAutoInjection
  value: true

parameters:
- name: stressMode
  values:
    - short
    - normal
    - long
  default: normal

stages:
  - template: /tools/pipelines/templates/include-conditionally-run-stress-tests.yml@self
    parameters:
      artifactBuildId: $(resources.pipeline.client.runID)
      fluidFrameworkSourceVersion: $(resources.pipeline.client.sourceCommit)
      packages:
        - name: "@fluidframework/sequence"
          affectedPaths:
          - packages/dds/sequence
          - packages/dds/merge-tree
          id: sequence
          testPackageDirectory: packages/dds/sequence
          testCommand: test:stress
        - name: "@fluid-experimental/tree"
          affectedPaths:
          - experimental/dds/tree
          id: experimental-tree
          testPackageDirectory: experimental/dds/tree
          testCommand: test:stress
        - name: "@fluidframework/tree"
          affectedPaths:
          - packages/dds/tree
          id: tree
          testPackageDirectory: packages/dds/tree
          testCommand: test:stress
        - name: "@fluidframework/map"
          affectedPaths:
          - packages/dds/map
          - packages/dds/merge-tree
          id: map
          testPackageDirectory: packages/dds/map
          testCommand: test:stress
        - name: "@fluidframework/matrix"
          affectedPaths:
          - packages/dds/matrix
          - packages/dds/merge-tree
          id: matrix
          testPackageDirectory: packages/dds/matrix
          testCommand: test:stress
      stressMode: ${{ parameters.stressMode }}
