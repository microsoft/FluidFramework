# This file is a workaround. pnpm does not support nesting packages under a workspace that is not managed by the
# workspace. That is, if there's a pnpm-workspace.yaml file anywhere in the parent hierarchy, pnpm doesn't install the
# package individually like one might expect.
#
# Because we have the client release group at the root of the repo, there's a pnpm-workspace.yaml file in the hierarchy
# for our independent packages as well. This file makes pnpm treat the project as a one-package workspace.
packages:
  - "."

# These entries must be duplicated from package.json due to a pnpm bug where onlyBuiltDependencies
# in package.json is not respected when the workspace has its own lockfile.
# See: https://github.com/pnpm/pnpm/issues/9082
onlyBuiltDependencies:
  - unrs-resolver

# Supply chain security settings - see /DEV.md for documentation
minimumReleaseAge: 1440
resolutionMode: highest
blockExoticSubdeps: true
trustPolicy: no-downgrade
# List of packages known to be safe but for whatever reason were published at a date after another version of the same
# package (including later major versions) which had better provenance information.
# ALWAYS REVIEW CAREFULLY BEFORE ADDING SOMETHING TO THIS LIST.
trustPolicyExclude:
  # chokidar@4.0.3 is a transitive dependency of mocha@11.x. The trust downgrade fires
  # because this version lacks provenance attestation while earlier 4.x releases had it.
  # No supply chain incident is known.
  # This version is heavily used (~40 million downloads) and a year old at this point,
  # and also used by other workspaces in this repo, so allowing it seems like a minimal risk.
  - "chokidar@4.0.3"
  # undici-types@6.21.0 is a transitive dependency pulled in via @types/node. The trust
  # downgrade fires because this version lacks provenance attestation while earlier releases
  # had it. No supply chain incident is known.
  # This version is heavily used (over 80 million downloads) and a year old at this point,
  # and also used by other workspaces in this repo, so allowing it seems like a minimal risk.
  - "undici-types@6.21.0"
  # semver@5.7.2 is a transitive dependency. The trust downgrade fires because this version
  # lacks provenance attestation while earlier releases of higher major versions had it (attestation was not backported to the 5 branch).
  # No supply chain incident is known.
  # This version is heavily used (~60 million downloads) and 3 years old at this point,
  # and also used by other workspaces in this repo, so allowing it seems like a minimal risk.
  - "semver@5.7.2"
strictDepBuilds: true
