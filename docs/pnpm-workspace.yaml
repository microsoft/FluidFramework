# This file is a workaround. pnpm does not support nesting packages under a workspace that is not managed by the
# workspace. That is, if there's a pnpm-workspace.yaml file anywhere in the parent hierarchy, pnpm doesn't install the
# package individually like one might expect.
#
# Because we have the client release group at the root of the repo, there's a pnpm-workspace.yaml file in the hierarchy
# for our independent packages as well. This file makes pnpm treat the project as a one-package workspace.

packages:
  - .

onlyBuiltDependencies:
  - '@parcel/watcher'
  - core-js
  - core-js-pure
  - keytar
  - linkcheck-bin
  - typesense-instantsearch-adapter
  - unrs-resolver

# Supply chain security settings - see /DEV.md for documentation
minimumReleaseAge: 1440
resolutionMode: highest
blockExoticSubdeps: true
trustPolicy: no-downgrade
strictDepBuilds: true

overrides:
  # @azure/identity: overridden to ^4.13.0 to pull a patched @azure/msal-browser (no patched 3.x
  # exists). Transitive dep of @azure/static-web-apps-cli; ^4.13.0 is API-compatible within the
  # ^4.3.0 range it declares.
  "@azure/identity": "^4.13.0"

  # @types/react: pinned to v18 to prevent pnpm re-resolution from pulling in v19, which is
  # incompatible with the React 18 docs site.
  "@types/react": "^18.3.12"

  # diff: overridden to patched version to resolve a known ReDoS vulnerability.
  "diff@>=5 <6": "^5.2.2"

  # js-yaml: overridden to fix a known vulnerability (prototype pollution via merge keys).
  "js-yaml@<4": "^3.14.2"
  "js-yaml@>=4": "^4.1.1"

  # jws: overridden to ^3.2.3 to resolve a known vulnerability in jws 3.2.2 (transitive via
  # jsonwebtoken). Stays within jsonwebtoken's declared ^3.2.2 range.
  jws: "^3.2.3"

  # mdast-util-to-hast: overridden to ^13.2.1 to fix a known vulnerability (unsanitized class
  # attribute injection).
  mdast-util-to-hast: "^13.2.1"

  # node-forge: overridden to ^1.4.0 to resolve known security vulnerabilities.
  node-forge: "^1.4.0"

  # qs: overridden to ^6.15.0 to resolve a known vulnerability in older versions.
  qs: "^6.15.0"

  # simple-git: overridden to ^3.32.3 to resolve a CG alert.
  simple-git: "^3.32.3"

  # validator: overridden to ^13.15.0 to resolve a known vulnerability in older versions (transitive
  # via swagger-tools).
  validator: "^13.15.0"

  # minimatch: overridden to patched versions to resolve known security vulnerabilities across all
  # major version ranges.
  "minimatch@>=3 <4": "^3.1.5"
  "minimatch@>=5 <6": "^5.1.9"
  "minimatch@>=6 <7": "^6.2.3"
  "minimatch@>=7 <8": "^7.4.9"
  "minimatch@>=8 <9": "^8.0.7"
  "minimatch@>=9 <10": "^9.0.9"
  "minimatch@>=10 <11": "^10.2.4"

  # serialize-javascript: overridden to ^7.0.4 to resolve GHSA-5c6j-r48x-rmvq. No 6.x fix exists;
  # 7.x is API-compatible (only drops Node <20 support).
  "serialize-javascript@>=6 <7": "^7.0.4"

  # express: overridden to ^4.22.1 to resolve a known vulnerability in express 4.21.2.
  "express@>=4 <5": "^4.22.1"

  # picomatch: overridden to patched versions to resolve a known security vulnerability.
  "picomatch@>=2 <3": "^2.3.2"
  "picomatch@>=4 <5": "^4.0.4"
