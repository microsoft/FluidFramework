# Compat workspace configuration for full-version test matrices.

packages:
  - '*'

# The security settings below are intentional — do not relax them.
minimumReleaseAge: 1440

# Exclude our own FF scopes so compat tests can install versions we just shipped
# without hitting the age gate (new releases are < 1440 min old for a few hours).
minimumReleaseAgeExclude:
  - "@fluidframework/*"
  - "@fluid-experimental/*"
  - "@fluid-internal/*"
  - "@fluid-private/*"
  - "@fluid-tools/*"
  - "fluid-framework"
overrides:
  axios@<1: ^0.31.1
  axios@>=1 <2: ^1.15.2
  jsrsasign@<12: ^11.1.1
  serialize-javascript@>=6 <7: ^7.0.5
  uuid@>=11 <12: ^11.1.1
  # @fluidframework/test-utils>mocha: dropped here because this workspace only loads test-utils' primary export at runtime (see test-version-utils/src/testApi.ts) — it never invokes the legacy test-utils' bundled test runner. Removing mocha eliminates serialize-javascript@6.0.2 (GHSA-5c6j-r48x-rmvq) which would otherwise be pulled in transitively across all back-compat versions of @fluidframework/test-utils.
  "@fluidframework/test-utils>mocha": "-"

# See: https://github.com/orgs/pnpm/discussions/11084
trustPolicy: off
