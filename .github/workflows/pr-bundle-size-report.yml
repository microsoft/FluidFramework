name: pr-bundle-size-report

# This workflow runs the bundle-size comparison for a PR and posts the result back to the PR via a sticky comment,
# label, and check entry.
#
# Triggers:
#   pull_request_target: handle the PR directly when it opens, synchronizes, or reopens.
#   check_run:           fires when ADO publishes the `Build - Client bundle size artifacts` check on a commit.
#                        The route job maps the check's SHA to affected PRs (PR-head match OR merge-base match)
#                        and the compare job fans out via matrix.
#
# Unlike the pr-check-changeset / changeset-reporter pair, this is a single workflow rather than the worker/reporter
# split. The split's primary defense — preventing PR-controlled code from running with write perms — doesn't apply
# here because this workflow never executes PR-authored code: it checks out the PR's BASE branch (not PR HEAD),
# fetches the PR head only as a git object, and runs base-branch flub against two ADO artifacts identified by SHA.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main, "release/**/*"]
  check_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: read

jobs:
  route:
    # Short-circuit check_run events that aren't the bundle-size pipeline completing successfully.
    # GitHub doesn't let us filter check_run events by name at the `on:` level, so we do it here.
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'check_run' &&
       github.event.check_run.name == 'Build - Client bundle size artifacts' &&
       github.event.check_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.collect.outputs.prs }}
    steps:
      - name: Collect affected PRs
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            # Easy case: the event already names the PR.
            PRS=$(jq -n -c \
              --argjson n ${{ github.event.pull_request.number }} \
              --arg h "${{ github.event.pull_request.head.sha }}" \
              --arg b "${{ github.event.pull_request.base.ref }}" \
              '[{number: $n, head: $h, baseRef: $b}]')
            echo "prs=$PRS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # check_run case: map the check's SHA back to affected open PRs.
          # A PR is affected if either its head SHA matches (PR build finished)
          # or its merge-base with its base branch matches (baseline build finished).
          # Use `gh api .../compare` for merge-base lookups so we don't need a local
          # git workspace and so each PR is evaluated against its actual base branch.
          SHA="${{ github.event.check_run.head_sha }}"
          PRS_JSON=$(gh pr list --state open \
            --json number,headRefOid,baseRefName --limit 200)

          AFFECTED='[]'
          while IFS= read -r pr; do
            PR_NUM=$(echo "$pr" | jq -r '.number')
            PR_HEAD=$(echo "$pr" | jq -r '.headRefOid')
            PR_BASE_REF=$(echo "$pr" | jq -r '.baseRefName')

            MATCH=0
            if [ "$PR_HEAD" = "$SHA" ]; then
              MATCH=1
            else
              MB=$(gh api "repos/$GITHUB_REPOSITORY/compare/$PR_BASE_REF...$PR_HEAD" \
                --jq '.merge_base_commit.sha' 2>/dev/null || true)
              [ "$MB" = "$SHA" ] && MATCH=1
            fi

            if [ $MATCH = 1 ]; then
              AFFECTED=$(echo "$AFFECTED" | jq -c \
                ". + [{number: $PR_NUM, head: \"$PR_HEAD\", baseRef: \"$PR_BASE_REF\"}]")
            fi
          done < <(echo "$PRS_JSON" | jq -c '.[]')
          echo "prs=$AFFECTED" >> "$GITHUB_OUTPUT"

  compare:
    needs: route
    if: needs.route.outputs.prs != '[]'
    strategy:
      matrix:
        pr: ${{ fromJSON(needs.route.outputs.prs) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      # Check out the PR's base branch — never PR HEAD. Full history for `git merge-base`.
      # release notes: https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ matrix.pr.baseRef }}
          fetch-depth: "0"
          persist-credentials: false

      # Fetch the PR head as an object so merge-base can resolve it. Never checks it out or executes anything from it.
      - name: Fetch PR head
        run: git fetch origin refs/pull/${{ matrix.pr.number }}/head

      - name: Compute merge-base
        id: merge-base
        run: |
          MERGE_BASE=$(git merge-base ${{ matrix.pr.head }} HEAD)
          echo "sha=$MERGE_BASE" >> "$GITHUB_OUTPUT"
          echo "Merge-base for PR #${{ matrix.pr.number }}: $MERGE_BASE"

      # release notes: https://github.com/pnpm/action-setup/releases/tag/v5.0.0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v5

      # release notes: https://github.com/actions/setup-node/releases/tag/v6.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Fluid build tools
        run: |
          cd build-tools
          pnpm install --frozen-lockfile
          pnpm run build:compile
          # Use npm link (not pnpm link) so flub lands on PATH with a proper shim.
          cd packages/build-cli
          npm link

      - name: Compare bundle sizes
        run: |
          flub report comparePipelineBundleArtifacts \
            --base ${{ steps.merge-base.outputs.sha }} \
            --head ${{ matrix.pr.head }} \
            --json | tee bundle-comparison.json
