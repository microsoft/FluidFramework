name: pr-bundle-size-report

# This workflow runs the bundle-size comparison for a PR and posts the result back to the PR via a sticky comment,
# label, and check entry.
#
# Triggers:
#   pull_request_target: kept as a trigger so a future "acknowledge-pr" job can post the initial sticky comment
#                        ("comparison pending build…") on PR open/sync/reopen. The comparison itself can't run on
#                        this event because the PR-side ADO build will have just kicked off.
#   check_run:           fires when ADO publishes either of the two bundle-publishing checks on a commit.
#                        `Build - Client bundle size artifacts` runs on main/release pushes (baseline-side bundle
#                        becomes available). `Build - client packages` runs on PR commits (head-side bundle becomes
#                        available). The identify-targets job maps the check's SHA to affected PRs (PR-head match OR
#                        merge-base match) and the compare job fans out via matrix.
#
# Unlike the pr-check-changeset / changeset-reporter pair, this is a single workflow rather than the worker/reporter
# split. The split's primary defense — preventing PR-controlled code from running with write perms — doesn't apply
# here because this workflow never executes PR-authored code: it doesn't check out PR HEAD and never references PR
# sources or scripts, only its SHA (which is forwarded to ADO to fetch a server-side artifact).

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main, "release/**/*"]
  check_run:
    types: [completed]

# Deduplicate runs for the same PR (pull_request_target) or the same upstream check SHA (check_run). Cancel earlier
# in-progress runs in the same group so the latest event wins on the sticky comment.
concurrency:
  group: pr-bundle-size-${{ github.event.pull_request.number || github.event.check_run.head_sha || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Acknowledge the PR on open/sync/reopen with the initial "comparison pending" sticky comment. The actual sticky
  # post is stubbed out below until comment-posting wiring lands — for now this job only logs the intent so the
  # workflow has a visible per-event signal that the pull_request_target trigger is firing as expected.
  acknowledge-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Acknowledge (stub)
        run: |
          echo "PR #${{ github.event.pull_request.number }} (${{ github.event.action }}) — would post initial 'comparison pending' sticky here."
      # release notes: https://github.com/marocchino/sticky-pull-request-comment/releases/tag/v3.0.4
      # - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # ratchet:marocchino/sticky-pull-request-comment@v3
      #   with:
      #     header: bundle-size-report
      #     number: ${{ github.event.pull_request.number }}
      #     message: |
      #       ## Bundle size comparison
      #
      #       Waiting for the ADO bundle-size build to complete. Will update with results when available.

  identify-targets:
    # Only fires on check_run completions for one of the two bundle-publishing pipelines. GitHub doesn't let us filter
    # check_run events by name at the `on:` level, so we do it here. pull_request_target intentionally skips this job
    # (compare auto-skips downstream as a result).
    if: >-
      github.event_name == 'check_run' &&
      (github.event.check_run.name == 'Build - Client bundle size artifacts' ||
       github.event.check_run.name == 'Build - client packages') &&
      github.event.check_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.collect.outputs.prs }}
    steps:
      - name: Collect affected PRs
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Server-side merge-base lookup. Returns the SHA, or empty on failure / disjoint history.
          # GitHub's compare API returns success with `merge_base_commit: null` for refs that share
          # no history, and `jq '.merge_base_commit.sha'` emits the literal string "null" — collapse
          # that to empty so callers only have one failure shape to handle.
          compute_mb() {
            local mb
            mb=$(gh api "repos/$GITHUB_REPOSITORY/compare/$1...$2" \
              --jq '.merge_base_commit.sha' 2>/dev/null || true)
            if [ "$mb" = "null" ]; then
              mb=""
            fi
            echo "$mb"
          }

          # Map the check's SHA back to affected open PRs. A PR is affected if either its head SHA matches (PR build
          # finished) or its merge-base with its base branch matches (baseline build finished). Only consider PRs
          # targeting branches the pull_request_target trigger also covers, so the two trigger surfaces agree on which
          # PRs are in scope.
          SHA="${{ github.event.check_run.head_sha }}"
          PR_LIST_LIMIT=500
          PRS_JSON=$(gh pr list --state open \
            --json number,headRefOid,baseRefName --limit "$PR_LIST_LIMIT")
          PR_COUNT=$(echo "$PRS_JSON" | jq 'length')
          if [ "$PR_COUNT" -ge "$PR_LIST_LIMIT" ]; then
            echo "WARNING: gh pr list returned the maximum $PR_LIST_LIMIT PRs; some open PRs may not have been considered." >&2
          fi
          PRS_JSON=$(echo "$PRS_JSON" | jq -c \
            '[.[] | select(.baseRefName == "main" or (.baseRefName | startswith("release/")))]')

          PR_LINES=$(echo "$PRS_JSON" | jq -c '.[]')
          AFFECTED='[]'
          while IFS= read -r pr; do
            PR_NUM=$(echo "$pr" | jq -r '.number')
            PR_HEAD=$(echo "$pr" | jq -r '.headRefOid')
            PR_BASE_REF=$(echo "$pr" | jq -r '.baseRefName')
            MB=$(compute_mb "$PR_BASE_REF" "$PR_HEAD")

            if [ "$PR_HEAD" = "$SHA" ] || [ "$MB" = "$SHA" ]; then
              if [ -z "$MB" ]; then
                echo "Skipping PR #$PR_NUM: merge-base lookup failed (base=$PR_BASE_REF, head=$PR_HEAD)." >&2
                continue
              fi
              ENTRY=$(jq -n -c \
                --argjson n "$PR_NUM" \
                --arg h "$PR_HEAD" \
                --arg b "$PR_BASE_REF" \
                --arg mb "$MB" \
                '{number: $n, head: $h, baseRef: $b, mergeBase: $mb}')
              AFFECTED=$(echo "$AFFECTED" | jq -c --argjson e "$ENTRY" '. + [$e]')
            fi
          done <<< "$PR_LINES"
          echo "prs=$AFFECTED" >> "$GITHUB_OUTPUT"

  compare:
    needs: identify-targets
    # Auto-skips when identify-targets is skipped (e.g. on pull_request_target events) per GitHub Actions'
    # default `needs:` behavior. The `prs != '[]'` guard handles the check_run case where no PRs are affected.
    if: needs.identify-targets.outputs.prs != '[]'
    strategy:
      matrix:
        pr: ${{ fromJSON(needs.identify-targets.outputs.prs) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      # Check out the PR's base branch (never PR HEAD, since PR-authored code isn't trusted) just to get
      # build-tools source so we can build flub. The comparison itself reads only ADO artifacts identified
      # by SHA — no local git state is required.
      # release notes: https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ matrix.pr.baseRef }}
          fetch-depth: "1"
          persist-credentials: false

      # release notes: https://github.com/pnpm/action-setup/releases/tag/v5.0.0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v5

      # release notes: https://github.com/actions/setup-node/releases/tag/v6.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Fluid build tools
        run: |
          cd build-tools
          pnpm install --frozen-lockfile
          pnpm run build:compile
          # Use npm link (not pnpm link) so flub lands on PATH with a proper shim.
          cd packages/build-cli
          npm link

      - name: Compare bundle sizes
        run: |
          set -euo pipefail
          flub report comparePipelineBundleArtifacts \
            --base ${{ matrix.pr.mergeBase }} \
            --head ${{ matrix.pr.head }} \
            --json | tee bundle-comparison.json
