name: "PR Bundle Size Comments"

# This workflow runs the bundle-size comparison for a PR and posts the result back to the PR via a sticky comment.
#
# Triggers are all `check_run`. We use the lifecycle of ADO's own published checks to decide what to do:
#
#   check_run.created:    when ADO creates the `Build - client packages` check on a commit (at build queue time),
#                         acknowledge-build posts an initial "pending" sticky on the matching open PR. PRs that
#                         don't trigger a client-packages build (e.g. server-only PRs) never get a sticky, by
#                         construction — ADO is the source of truth for which PRs need a comparison.
#   check_run.completed:  when ADO updates either of the two bundle-publishing checks to a successful conclusion,
#                         identify-targets maps the check's SHA back to affected PRs and the compare job fans out
#                         via matrix.
#                         `Build - Client bundle size artifacts` runs on main/release pushes (baseline bundle just
#                         became available). `Build - client packages` runs on PR commits (head-side bundle just
#                         became available).
#
# Unlike the pr-check-changeset / changeset-reporter pair, this is a single workflow rather than the worker/reporter
# split. The split's primary defense — preventing PR-controlled code from running with write perms — doesn't apply
# here because this workflow never executes PR-authored code: it doesn't check out PR HEAD and never references PR
# sources or scripts, only its SHA (which is forwarded to ADO to fetch a server-side artifact).

on:
  check_run:
    types: [created, completed]

# Deduplicate runs for the same upstream check SHA. Cancel earlier in-progress runs in the same group so the
# latest event wins on the sticky comment.
concurrency:
  group: pr-bundle-size-${{ github.event.check_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Posts the initial "build pending" sticky comment when ADO queues the `Build - client packages` check
  # for a PR commit. Non-client PRs never trigger that check, so they correctly receive no sticky.
  acknowledge-build:
    if: >-
      github.event.action == 'created' &&
      github.event.check_run.name == 'Build - client packages'
    runs-on: ubuntu-latest
    # Uncomment to enable comment posting after bake-in.
    # permissions:
    #   pull-requests: write
    steps:
      - name: Resolve PR for check SHA
        id: find_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.check_run.head_sha }}"
          # Find the open PR whose head SHA matches this check. `head-sha:` is a GitHub search qualifier
          # that does the match server-side. At most one PR is expected.
          PR_NUM=$(gh pr list --state open --search "head-sha:$SHA" --json number \
            --jq '.[0].number // empty')
          if [ -z "$PR_NUM" ]; then
            echo "No matching open PR for SHA $SHA; nothing to do." >&2
          fi
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: Render initial comment body
        if: steps.find_pr.outputs.pr_num != ''
        run: |
          set -euo pipefail
          cat > acknowledge.md <<'EOF'
          ## Bundle size comparison

          Pending — `Build - client packages` is running. Results will appear here when the build completes.
          EOF
          echo "PR #${{ steps.find_pr.outputs.pr_num }}: would post the following body as a sticky comment."
          echo
          echo "--- acknowledge.md ---"
          cat acknowledge.md
          echo "--- end ---"

      # Uncomment to enable comment posting after bake-in.
      # release notes: https://github.com/marocchino/sticky-pull-request-comment/releases/tag/v3.0.4
      # - if: steps.find_pr.outputs.pr_num != ''
      #   uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # ratchet:marocchino/sticky-pull-request-comment@v3
      #   with:
      #     header: bundle-size-report
      #     number: ${{ steps.find_pr.outputs.pr_num }}
      #     path: ${{ github.workspace }}/acknowledge.md

  # Reacts to a PR's own `Build - client packages` build completing. The check SHA is a PR head SHA, so we
  # produce at most one matrix entry — the PR whose head matches.
  identify-from-pr-build:
    if: >-
      github.event.action == 'completed' &&
      github.event.check_run.name == 'Build - client packages' &&
      github.event.check_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.collect.outputs.prs }}
    steps:
      - name: Collect affected PRs
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Server-side merge-base lookup. Returns the SHA, or empty on failure / disjoint history.
          # GitHub's compare API returns success with `merge_base_commit: null` for refs that share
          # no history, and `jq '.merge_base_commit.sha'` emits the literal string "null" — collapse
          # that to empty so callers only have one failure shape to handle.
          compute_mb() {
            local mb
            mb=$(gh api "repos/$GITHUB_REPOSITORY/compare/$1...$2" \
              --jq '.merge_base_commit.sha' 2>/dev/null || true)
            if [ "$mb" = "null" ]; then
              mb=""
            fi
            echo "$mb"
          }

          # Find the open PR whose head SHA matches this check. `head-sha:` is a GitHub search qualifier
          # that does the match server-side. At most one PR is expected.
          SHA="${{ github.event.check_run.head_sha }}"
          PR_JSON=$(gh pr list --state open --search "head-sha:$SHA" \
            --json number,headRefOid,baseRefName \
            --jq '.[0]')

          AFFECTED='[]'
          if [ -n "$PR_JSON" ] && [ "$PR_JSON" != "null" ]; then
            PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
            PR_HEAD=$(echo "$PR_JSON" | jq -r '.headRefOid')
            PR_BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName')
            MB=$(compute_mb "$PR_BASE_REF" "$PR_HEAD")
            if [ -z "$MB" ]; then
              echo "Skipping PR #$PR_NUM: merge-base lookup failed (base=$PR_BASE_REF, head=$PR_HEAD)." >&2
            else
              ENTRY=$(jq -n -c \
                --argjson n "$PR_NUM" \
                --arg h "$PR_HEAD" \
                --arg b "$PR_BASE_REF" \
                --arg mb "$MB" \
                '{number: $n, head: $h, baseRef: $b, mergeBase: $mb}')
              AFFECTED=$(echo "$AFFECTED" | jq -c --argjson e "$ENTRY" '. + [$e]')
            fi
          fi
          echo "prs=$AFFECTED" >> "$GITHUB_OUTPUT"

  # Reacts to the baseline pipeline (`Build - Client bundle size artifacts`) completing on a main/release
  # commit. The check SHA is on the base branch, so we produce a matrix entry per open PR whose merge-base
  # equals this SHA — typically 0–few PRs.
  identify-from-baseline-build:
    if: >-
      github.event.action == 'completed' &&
      github.event.check_run.name == 'Build - Client bundle size artifacts' &&
      github.event.check_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.collect.outputs.prs }}
    steps:
      - name: Collect affected PRs
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          compute_mb() {
            local mb
            mb=$(gh api "repos/$GITHUB_REPOSITORY/compare/$1...$2" \
              --jq '.merge_base_commit.sha' 2>/dev/null || true)
            if [ "$mb" = "null" ]; then
              mb=""
            fi
            echo "$mb"
          }

          # Map the check's SHA back to affected open PRs via merge-base match.
          SHA="${{ github.event.check_run.head_sha }}"
          PR_LIST_LIMIT=500
          PRS_JSON=$(gh pr list --state open \
            --json number,headRefOid,baseRefName --limit "$PR_LIST_LIMIT")
          PR_COUNT=$(echo "$PRS_JSON" | jq 'length')
          if [ "$PR_COUNT" -ge "$PR_LIST_LIMIT" ]; then
            echo "WARNING: gh pr list returned the maximum $PR_LIST_LIMIT PRs; some open PRs may not have been considered." >&2
          fi

          PR_LINES=$(echo "$PRS_JSON" | jq -c '.[]')
          AFFECTED='[]'
          while IFS= read -r pr; do
            PR_NUM=$(echo "$pr" | jq -r '.number')
            PR_HEAD=$(echo "$pr" | jq -r '.headRefOid')
            PR_BASE_REF=$(echo "$pr" | jq -r '.baseRefName')
            MB=$(compute_mb "$PR_BASE_REF" "$PR_HEAD")

            if [ "$PR_HEAD" = "$SHA" ] || [ "$MB" = "$SHA" ]; then
              if [ -z "$MB" ]; then
                echo "Skipping PR #$PR_NUM: merge-base lookup failed (base=$PR_BASE_REF, head=$PR_HEAD)." >&2
                continue
              fi
              ENTRY=$(jq -n -c \
                --argjson n "$PR_NUM" \
                --arg h "$PR_HEAD" \
                --arg b "$PR_BASE_REF" \
                --arg mb "$MB" \
                '{number: $n, head: $h, baseRef: $b, mergeBase: $mb}')
              AFFECTED=$(echo "$AFFECTED" | jq -c --argjson e "$ENTRY" '. + [$e]')
            fi
          done <<< "$PR_LINES"
          echo "prs=$AFFECTED" >> "$GITHUB_OUTPUT"

  compare:
    needs: [identify-from-pr-build, identify-from-baseline-build]
    # Either upstream produces the matrix; the other will be skipped per event type. Without
    # `!cancelled()`, GitHub Actions auto-skips a job whose `needs:` had any skipped entry.
    if: |
      !cancelled() && (
        (needs.identify-from-pr-build.result == 'success' && needs.identify-from-pr-build.outputs.prs != '[]') ||
        (needs.identify-from-baseline-build.result == 'success' && needs.identify-from-baseline-build.outputs.prs != '[]')
      )
    strategy:
      matrix:
        pr: ${{ fromJSON(needs.identify-from-pr-build.outputs.prs || needs.identify-from-baseline-build.outputs.prs || '[]') }}
      fail-fast: false
    runs-on: ubuntu-latest
    # Uncomment to enable comment posting after bake-in.
    # permissions:
    #   pull-requests: write
    steps:
      # Check out the PR's base branch (never PR HEAD — PR-authored code isn't trusted) just to get build-tools
      # source so we can build flub. The comparison itself reads only ADO artifacts identified by SHA — no local
      # git state is required.
      # release notes: https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ matrix.pr.baseRef }}
          fetch-depth: "1"
          persist-credentials: false

      # release notes: https://github.com/pnpm/action-setup/releases/tag/v5.0.0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v5

      # release notes: https://github.com/actions/setup-node/releases/tag/v6.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Fluid build tools
        run: |
          cd build-tools
          pnpm install --frozen-lockfile
          pnpm run build:compile
          # Use npm link (not pnpm link) so flub lands on PATH with a proper shim.
          cd packages/build-cli
          npm link

      - name: Compare bundle sizes
        # Upstream oclif bug (oclif/core#1608): in `--json` mode, thrown errors render as `{"error":{}}` to
        # stdout and nothing to stderr — the message is lost. On non-zero exit we re-run without `--json` so
        # the failure reason is visible in the action log.
        run: |
          set -uo pipefail
          set +e
          flub report comparePipelineBundleArtifacts \
            --base ${{ matrix.pr.mergeBase }} \
            --head ${{ matrix.pr.head }} \
            --json > bundle-comparison.json
          EC=$?
          cat bundle-comparison.json
          if [ "$EC" -ne 0 ]; then
            echo
            echo "flub --json exited $EC; re-running without --json so the error message is visible:"
            flub report comparePipelineBundleArtifacts \
              --base ${{ matrix.pr.mergeBase }} \
              --head ${{ matrix.pr.head }} 2>&1 || true
            exit "$EC"
          fi

      # Format the JSON into the markdown body the sticky comment would post. Done here (not in flub) so
      # the formatting is easy to iterate on without rebuilding build-tools. The body is written to
      # bundle-comparison.md and also echoed to the action log so we can see what the eventual sticky
      # would contain without actually posting it.
      - name: Render bundle-size comment body
        run: |
          set -euo pipefail
          jq -r '
            def fmt_delta($d):
              if $d > 0 then "+\($d)" else "\($d)" end;
            . as $root
            | [
                "## Bundle size comparison",
                "",
                "Base commit: `\($root.baseCommit)`",
                "Head commit: `\($root.headCommit)`",
                ""
              ]
              + (
                  [
                    $root.comparison | to_entries[]
                    | .key as $pkg
                    | .value
                    | [
                        to_entries[]
                        | .key as $bundle
                        | .value as $cmp
                        | if ($cmp.base == null and $cmp.compare != null) then
                            "- `\($bundle)`: **added** (parsed \($cmp.compare.parsedSize), gzip \($cmp.compare.gzipSize))"
                          elif ($cmp.compare == null and $cmp.base != null) then
                            "- `\($bundle)`: **removed** (was parsed \($cmp.base.parsedSize), gzip \($cmp.base.gzipSize))"
                          elif ($cmp.base.parsedSize != $cmp.compare.parsedSize or $cmp.base.gzipSize != $cmp.compare.gzipSize) then
                            ($cmp.compare.parsedSize - $cmp.base.parsedSize) as $dp
                            | ($cmp.compare.gzipSize - $cmp.base.gzipSize) as $dg
                            | "- `\($bundle)`: parsed " + fmt_delta($dp) + ", gzip " + fmt_delta($dg)
                          else empty end
                      ] as $lines
                    | if ($lines | length) > 0 then
                        ["### `\($pkg)`", ""] + $lines + [""]
                      else empty end
                  ]
                  | add // ["No bundle-size changes."]
                )
            | .[]
          ' bundle-comparison.json > bundle-comparison.md

          echo "PR #${{ matrix.pr.number }}: would post the following body as a sticky comment."
          echo
          echo "--- bundle-comparison.md ---"
          cat bundle-comparison.md
          echo "--- end ---"

      # Uncomment to enable comment posting after bake-in.
      # release notes: https://github.com/marocchino/sticky-pull-request-comment/releases/tag/v3.0.4
      # - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # ratchet:marocchino/sticky-pull-request-comment@v3
      #   with:
      #     header: bundle-size-report
      #     number: ${{ matrix.pr.number }}
      #     path: ${{ github.workspace }}/bundle-comparison.md
