name: "PR Review Auto Router"

# Automatically determines fleet size when a PR is opened, based on diff
# size and complexity. Saves dispatch params as an artifact; the fleet
# workflow (pr-review-fleet.yml) triggers via workflow_run.
#
# Sizing thresholds:
#   small  (1 reviewer) â€” â‰¤ 100 lines AND â‰¤ 5 files AND â‰¤ 1 package
#   large  (5 reviewers) â€” > 500 lines OR > 30 files OR > 5 packages
#   medium (3 reviewers) â€” everything else
#
# "Packages" = distinct top-level dirs under packages/, experimental/, examples/.
#
# If the PR already has a fleet-review* label when it opens, this workflow
# skips â€” the label dispatcher (pr-review-dispatch.yml) takes precedence.

on:
  pull_request:
    types:
      - opened
      - reopened
    branches:
      - main
      - next
      - release/**/*

permissions:
  contents: read

concurrency:
  group: pr-review-auto-route-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  route:
    name: "Compute fleet size"
    # Yield to manual dispatch if a fleet-review* label is already on the PR.
    if: "!contains(toJson(github.event.pull_request.labels.*.name), 'fleet-review')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute PR metrics
        id: metrics
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Lines changed: insertions + deletions, ignoring binary files (shown as '-' in numstat)
          LINES=$(git diff "origin/${BASE_REF}...HEAD" --numstat \
            | awk '$1 ~ /^[0-9]+$/ && $2 ~ /^[0-9]+$/ {sum+=$1+$2} END{print sum+0}')

          # Total files changed
          FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" | wc -l | tr -d ' ')

          # Distinct packages touched (top-level dirs under packages/, experimental/, examples/)
          PACKAGES=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
            | grep -E '^(packages|experimental|examples)/' \
            | cut -d/ -f2 | sort -u | wc -l | tr -d ' ')

          echo "lines=$LINES"       >> "$GITHUB_OUTPUT"
          echo "files=$FILES"       >> "$GITHUB_OUTPUT"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "Metrics: lines=${LINES} files=${FILES} packages=${PACKAGES}"

      - name: Determine fleet size
        id: size
        env:
          LINES: ${{ steps.metrics.outputs.lines }}
          FILES: ${{ steps.metrics.outputs.files }}
          PACKAGES: ${{ steps.metrics.outputs.packages }}
        run: |
          if [ "$LINES" -le 100 ] && [ "$FILES" -le 5 ] && [ "$PACKAGES" -le 1 ]; then
            COUNT=1
            TIER=small
          elif [ "$LINES" -gt 500 ] || [ "$FILES" -gt 30 ] || [ "$PACKAGES" -gt 5 ]; then
            COUNT=5
            TIER=large
          else
            COUNT=3
            TIER=medium
          fi
          echo "reviewer_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Routing to ${TIER} fleet (${COUNT} reviewer(s))"

      - name: Save dispatch params
        run: |
          mkdir -p dispatch
          printf '{\n  "pr_number": %s,\n  "reviewer_count": %s,\n  "head_sha": "%s",\n  "base_ref": "%s"\n}\n' \
            "${{ github.event.pull_request.number }}" \
            "${{ steps.size.outputs.reviewer_count }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ github.base_ref }}" \
            > dispatch/params.json
          cat dispatch/params.json

      - name: Upload dispatch params
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: dispatch-params
          path: dispatch/params.json
          retention-days: 1
