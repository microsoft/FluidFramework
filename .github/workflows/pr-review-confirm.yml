name: "PR Review Confirm"

# Listens for edits to the bot's auto-route proposal comment. When a user with
# write access ticks the "Start review" checkbox (transitioning it from
# unchecked to checked), triggers the review fleet with the currently-selected
# reviewer set, then resets the Start review checkbox so a single tick
# requests the next review (no uncheck-then-recheck dance required).
#
# Activation guard: the `if:` filter below requires the edited comment to be
# the bot-authored proposal comment (identified by the
# `<!-- pr-review-confirm -->` HTML marker that pr-review-auto-route.yml
# embeds). PR head_sha and base_ref are fetched fresh from the GitHub API
# rather than read from a metadata artifact, so the confirm flow always
# operates on the PR's current state.
#
# The Start-review reset is itself a comment edit but is authored by the bot,
# so the `sender.type == 'User'` guard on this workflow prevents a self-loop.

on:
  issue_comment:
    types: [edited]

permissions:
  contents: read
  pull-requests: write
  # `actions: write` is required for `gh workflow run` below to dispatch
  # pr-review-fleet.yml. GITHUB_TOKEN can dispatch workflows in its own repo
  # only when this permission is granted — without it, the dispatch call 403s.
  actions: write

# Serialize per-PR so rapid-fire checkbox toggles don't race to trigger the fleet.
# Don't cancel in-progress runs — a trigger deserves to complete.
concurrency:
  group: pr-review-confirm-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  handle-toggle:
    name: "Handle checkbox toggle"
    # Fast rejects before we do any work:
    #   - must be on a PR comment
    #   - edit must come from a human user (not a bot re-posting)
    #   - edited comment must be the auto-route bot's proposal comment
    #   - Start review box transitioned from unchecked to checked (the substring
    #     below must match `pr_review_propose.py`'s START_LABEL rendering — keep
    #     them in sync)
    # Trust of the editing user is verified by an explicit permission check
    # below (we can't do it in `if:` because the comment author is the bot).
    if: |
      github.event.issue.pull_request != null &&
      github.event.sender.type == 'User' &&
      github.event.comment.user.login == 'github-actions[bot]' &&
      contains(github.event.comment.body, '<!-- pr-review-confirm -->') &&
      contains(github.event.comment.body, '- [x] **Start review**') &&
      !contains(github.event.changes.body.from, '- [x] **Start review**')
    runs-on: ubuntu-latest
    steps:
      # The comment is authored by the bot, so `author_association` on the
      # event is the bot's — not meaningful for trust. Check the acting user's
      # repo permission directly. `require: write` accepts write|maintain|admin.
      - name: Verify editor has write access
        id: authz
        uses: actions-cool/check-user-permission@7b90a27f92f3961b368376107661682c441f6103 # ratchet:actions-cool/check-user-permission@v2.3.0
        with:
          require: write
          username: ${{ github.event.sender.login }}

      - name: Checkout scripts
        if: steps.authz.outputs.require-result == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          sparse-checkout: |
            .github/scripts
          persist-credentials: false

      # Fetch the PR's current head_sha and base_ref directly from the API
      # rather than relying on a metadata artifact uploaded at PR-open time.
      # This means a force-push or new commit between the auto-route comment
      # and the user's checkbox toggle is handled correctly — the fleet runs
      # against the PR's actual current state.
      - name: Fetch PR state
        id: pr
        if: steps.authz.outputs.require-result == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
          BASE_REF=$(echo "$PR_JSON" | jq -r '.base.ref')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF"   >> "$GITHUB_OUTPUT"

          echo "PR #${PR_NUMBER} | head=${HEAD_SHA} | base=${BASE_REF}"

      - name: Parse selected reviewers
        id: checkboxes
        if: steps.authz.outputs.require-result == 'true'
        env:
          CONFIRM_BODY: ${{ github.event.comment.body }}
        run: |
          printf '%s' "$CONFIRM_BODY" > /tmp/confirm-body.txt
          SELECTED=$(python3 .github/scripts/pr_review_propose.py parse-checkboxes /tmp/confirm-body.txt)
          echo "selected=$SELECTED" >> "$GITHUB_OUTPUT"
          echo "Selected reviewers: ${SELECTED}"

      - name: Handle empty selection
        id: empty-check
        if: steps.authz.outputs.require-result == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          SELECTED: ${{ steps.checkboxes.outputs.selected }}
        run: |
          COUNT=$(echo "$SELECTED" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
              --body "You haven't selected any reviewers. Tick at least one reviewer checkbox in the proposal comment, then tick **Start review** again."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger review fleet
        if: |
          steps.authz.outputs.require-result == 'true' &&
          steps.empty-check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          SELECTED: ${{ steps.checkboxes.outputs.selected }}
        run: |
          gh workflow run pr-review-fleet.yml \
            --repo "${REPO}" \
            --field "pr_number=${PR_NUMBER}" \
            --field "reviewers=${SELECTED}" \
            --field "head_sha=${HEAD_SHA}" \
            --field "base_ref=${BASE_REF}"

          echo "Triggered fleet for PR #${PR_NUMBER} with reviewers: ${SELECTED}"

      - name: Post acknowledgement
        if: |
          steps.authz.outputs.require-result == 'true' &&
          steps.empty-check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          SELECTED: ${{ steps.checkboxes.outputs.selected }}
        run: |
          NAMES=$(python3 .github/scripts/pr_review_propose.py format-names "$SELECTED")
          gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
            --body "On it! Starting review with: ${NAMES}"

      # Reset the Start review checkbox so the next tick triggers a re-review.
      # Runs whether or not we dispatched (empty-selection paths reset too —
      # otherwise the user would be stuck with a checked Start box and would
      # need to uncheck-recheck after fixing their reviewer selection).
      # Bot-authored edits don't re-fire this workflow because the `if:` filter
      # requires `sender.type == 'User'`.
      - name: Reset Start checkbox
        if: steps.authz.outputs.require-result == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          printf '%s' "$COMMENT_BODY" > /tmp/orig-body.md
          python3 .github/scripts/pr_review_propose.py reset-start /tmp/orig-body.md > /tmp/reset-body.md
          gh api --method PATCH \
            "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -F "body=@/tmp/reset-body.md"
