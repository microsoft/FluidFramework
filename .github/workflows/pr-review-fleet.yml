name: "PR Review Fleet"

# Runs a fleet of parallel Copilot CLI reviewer agents on a PR.
# Each reviewer focuses on a different axis with an adversarial persona.
# A consolidation job merges, de-duplicates, and posts one structured report.
#
# Triggers:
#   - workflow_run: fired by pr-review-dispatch.yml after label detection
#   - workflow_dispatch: for manual or programmatic triggering
#
# Authentication: Uses the existing COPILOT_GITHUB_TOKEN repository secret.
# See: https://docs.github.com/en/copilot/how-tos/copilot-cli/automate-copilot-cli/automate-with-actions

on:
  workflow_run:
    workflows: ["PR Review Fleet Dispatcher"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
      reviewer_count:
        description: "Number of reviewers to spawn (ignored when 'reviewers' is provided)"
        required: false
        type: choice
        options:
          - "1"
          - "3"
          - "5"
        default: "3"
      reviewers:
        description: "JSON array of reviewer names (overrides reviewer_count when provided, e.g. [\"correctness\",\"security\"])"
        required: false
        type: string
        default: ""
      head_sha:
        description: "PR head SHA to review"
        required: true
        type: string
      base_ref:
        description: "Base branch ref (e.g. main)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  actions: read # Required to download artifacts from triggering workflow run
  checks: write # Required to create/update the "Fleet Review" check run surfaced on the PR's Checks tab

concurrency:
  group: pr-review-fleet-${{ github.event.workflow_run.id || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Resolve PR context from either the upstream artifact or inputs
  # ──────────────────────────────────────────────────────────────
  setup:
    name: "Setup"
    # For workflow_run: only proceed if the dispatcher succeeded
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.params.outputs.pr_number }}
      head_sha: ${{ steps.params.outputs.head_sha }}
      base_ref: ${{ steps.params.outputs.base_ref }}
      reviewers: ${{ steps.params.outputs.reviewers }}
      check_run_id: ${{ steps.check.outputs.check_id }}
    steps:
      - name: Download dispatch params
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          name: dispatch-params
          path: dispatch
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse parameters and select reviewers
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_REVIEWER_COUNT: ${{ inputs.reviewer_count }}
          INPUT_REVIEWERS: ${{ inputs.reviewers }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            # Label-based dispatch always uses the default fleet size.
            # The dispatcher uploads `dispatch/params.json`; upload-artifact
            # preserves the directory structure relative to the workspace, so
            # the file lands at `dispatch/params.json` after download too.
            PR_NUMBER=$(jq -r '.pr_number' dispatch/params.json)
            HEAD_SHA=$(jq -r '.head_sha' dispatch/params.json)
            BASE_REF=$(jq -r '.base_ref' dispatch/params.json)
            REVIEWER_COUNT=3
          else
            PR_NUMBER="$INPUT_PR_NUMBER"
            REVIEWER_COUNT="$INPUT_REVIEWER_COUNT"
            HEAD_SHA="$INPUT_HEAD_SHA"
            BASE_REF="$INPUT_BASE_REF"
          fi

          # If an explicit reviewer list was provided (e.g. from the confirm workflow
          # after the user toggled checkboxes), use it directly. Otherwise fall back
          # to taking the first REVIEWER_COUNT entries from the priority-ordered list.
          # `jq -c` is required: pretty-printed (multi-line) JSON written via plain
          # `echo key=value >> $GITHUB_OUTPUT` truncates at the first newline,
          # which would silently break `fromJson(needs.setup.outputs.reviewers)`.
          if [ -n "$INPUT_REVIEWERS" ] && [ "$INPUT_REVIEWERS" != "" ]; then
            REVIEWERS=$(echo "$INPUT_REVIEWERS" | jq -c .)
            REVIEWER_COUNT=$(echo "$REVIEWERS" | jq 'length')
          else
            ALL='["correctness","security","api-compatibility","performance","testing"]'
            REVIEWERS=$(echo "$ALL" | jq -c --argjson n "$REVIEWER_COUNT" '.[:$n]')
          fi

          echo "pr_number=$PR_NUMBER"   >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA"     >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF"     >> "$GITHUB_OUTPUT"
          echo "reviewers=$REVIEWERS"   >> "$GITHUB_OUTPUT"

          echo "PR #${PR_NUMBER} | ${REVIEWER_COUNT} reviewer(s): ${REVIEWERS}"

      # ── Create a check run on the PR head ─────────────────────────────────
      # workflow_dispatch runs are free-standing — they don't appear on the
      # PR's Checks tab on their own. Creating a check run against the PR head
      # surfaces this run in the PR UI with a link back to the workflow logs.
      - name: Create check run
        id: check
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # ratchet:LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Fleet Review"
          sha: ${{ steps.params.outputs.head_sha }}
          status: "in_progress"
          details_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ── Post an in-progress sticky comment with a run link ────────────────
      # Sticky keeps a single comment per `header` — the consolidate job posts
      # the final body using the same header, overwriting this in place.
      - name: Write in-progress body
        env:
          REVIEWERS: ${{ steps.params.outputs.reviewers }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NAMES=$(echo "$REVIEWERS" | jq -r 'join(", ")')
          cat > body.md <<EOF
          ## Fleet Review — In progress

          Running reviewers: ${NAMES}

          [View run](${RUN_URL})
          EOF

      - name: Post in-progress comment
        # release notes: https://github.com/marocchino/sticky-pull-request-comment/releases/tag/v2.9.4
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-review-fleet
          number: ${{ steps.params.outputs.pr_number }}
          path: body.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Fan-out: run each reviewer in parallel via matrix strategy
  # ──────────────────────────────────────────────────────────────
  review:
    name: "Review: ${{ matrix.reviewer }}"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Let all reviewers finish even if one fails
      matrix:
        reviewer: ${{ fromJson(needs.setup.outputs.reviewers) }}

    steps:
      # ── Checkout ──
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: refs/pull/${{ needs.setup.outputs.pr_number }}/head
          fetch-depth: 0

      # ── Prepare the diff ──
      - name: Generate PR diff
        env:
          BASE_REF: ${{ needs.setup.outputs.base_ref }}
        run: |
          git diff "origin/${BASE_REF}...HEAD" > pr-diff.patch
          echo "Generated diff: $(wc -l < pr-diff.patch) lines"

      # ── Prepare the prompt ──
      # Read the prompt from the BASE branch, not the PR HEAD, to prevent
      # prompt injection via malicious changes to prompt files in the PR.
      - name: Prepare reviewer prompt
        id: prompt
        env:
          REVIEWER: ${{ matrix.reviewer }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          BASE_REF: ${{ needs.setup.outputs.base_ref }}
        run: |
          PROMPT_PATH=".github/prompts/reviewers/${REVIEWER}.md"
          PROMPT_FILE="/tmp/prompt-${REVIEWER}.md"

          # Extract the prompt from the base branch, not the PR checkout
          if ! git show "origin/${BASE_REF}:${PROMPT_PATH}" > "$PROMPT_FILE" 2>/dev/null; then
            echo "::error::Prompt file not found on base branch: ${PROMPT_PATH}"
            exit 1
          fi

          # Substitute context placeholders
          sed -i "s|__REPO__|${REPO}|g" "$PROMPT_FILE"
          sed -i "s|__PR_NUMBER__|${PR_NUMBER}|g" "$PROMPT_FILE"

          # Inject API conventions into the api-compatibility reviewer prompt
          if [ "$REVIEWER" = "api-compatibility" ]; then
            CONVENTIONS_PATH=".claude/skills/review/api-conventions.md"
            CONVENTIONS=$(git show "origin/${BASE_REF}:${CONVENTIONS_PATH}" 2>/dev/null || echo "(api-conventions.md not found on base branch)")
            # Use awk to replace the placeholder since conventions contain special chars
            awk -v conv="$CONVENTIONS" '{gsub(/__API_CONVENTIONS__/, conv); print}' "$PROMPT_FILE" > "${PROMPT_FILE}.tmp"
            mv "${PROMPT_FILE}.tmp" "$PROMPT_FILE"
          fi

          echo "prompt_file=$PROMPT_FILE" >> "$GITHUB_OUTPUT"

      # ── Install Copilot CLI ──
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      # ── Run the reviewer agent ──
      - name: Run reviewer
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_MODEL: claude-sonnet-4-6
          PROMPT_FILE: ${{ steps.prompt.outputs.prompt_file }}
        timeout-minutes: 15
        run: |
          PROMPT=$(cat "$PROMPT_FILE")
          # File inspection is done via the workspace-scoped `read` tool.
          # Only `shell(git:*)` is granted so the agent can run diff/log/etc.
          # Broader shell grants (cat/head/tail/grep/ls/wc) would let a
          # prompt-injected agent read env vars or credential files and
          # exfiltrate them via the generated report.
          copilot \
            -p "$PROMPT" \
            --allow-tool='shell(git:*)' \
            --allow-tool=read \
            --allow-tool=write \
            --no-ask-user

      # ── Upload results as artifact ──
      - name: Upload review output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: review-${{ matrix.reviewer }}
          path: review-${{ matrix.reviewer }}.json
          if-no-files-found: ignore
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # Fan-in: consolidate, de-duplicate, and post one report
  # ──────────────────────────────────────────────────────────────
  consolidate:
    name: "Consolidate Review"
    needs: [setup, review]
    if: always() && needs.review.result != 'skipped'
    runs-on: ubuntu-latest
    outputs:
      has_findings: ${{ steps.consolidate.outputs.has_findings }}
    steps:
      - name: Checkout scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Download all review artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          path: reviews
          pattern: review-*
          merge-multiple: true

      - name: Consolidate findings
        id: consolidate
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          REVIEWERS: ${{ needs.setup.outputs.reviewers }}
        run: |
          set +e
          python3 .github/scripts/consolidate_reviews.py reviews "$RUN_URL" -o report.md --pr-number "$PR_NUMBER" --reviewers "$REVIEWERS"
          exit_code=$?
          set -e
          if [ $exit_code -eq 2 ]; then
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          elif [ $exit_code -eq 0 ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            exit $exit_code
          fi

      # Defense in depth: scrub GitHub token patterns from the report before
      # posting. Even with the agent sandboxed to `shell(git:*)` + `read`, a
      # leaked token in the generated report would be a critical failure.
      - name: Scrub secrets from report
        if: steps.consolidate.outputs.has_findings == 'true'
        run: |
          python3 -c '
          import re, sys
          patterns = [
              r"gh[pousr]_[A-Za-z0-9_]{16,}",
              r"github_pat_[A-Za-z0-9_]{16,}",
          ]
          with open("report.md", "r") as f:
              text = f.read()
          for p in patterns:
              text = re.sub(p, "[REDACTED]", text)
          with open("report.md", "w") as f:
              f.write(text)
          '

      # Write a clean-verdict body when consolidation found no issues. This step
      # and the one below run unconditionally so a subsequent clean run always
      # overwrites a prior findings comment (rather than leaving it stale).
      - name: Write clean-run body
        if: steps.consolidate.outputs.has_findings == 'false'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat > report.md <<EOF
          <!-- pr-review-fleet -->
          ## Fleet Review — Clean

          No issues found across the reviewer fleet for this run.

          [View run](${RUN_URL})
          EOF

      - name: Post or update PR comment
        # release notes: https://github.com/marocchino/sticky-pull-request-comment/releases/tag/v2.9.4
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-review-fleet
          number: ${{ needs.setup.outputs.pr_number }}
          path: report.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Always-runs teardown: finalize the check run created in setup.
  # Lives in its own job (not inside `consolidate`) so it still
  # runs when `review`/`consolidate` are skipped — e.g., when
  # `setup` fails after the check has already been created.
  # Without this, a failed setup would leave the PR's "Fleet
  # Review" check stuck in "in_progress" forever.
  # ──────────────────────────────────────────────────────────────
  teardown:
    name: "Finalize check run"
    needs: [setup, review, consolidate]
    if: always() && needs.setup.outputs.check_run_id != ''
    runs-on: ubuntu-latest
    steps:
      - name: Compute check conclusion
        id: conclusion
        env:
          SETUP_RESULT: ${{ needs.setup.result }}
          REVIEW_RESULT: ${{ needs.review.result }}
          CONSOLIDATE_RESULT: ${{ needs.consolidate.result }}
          HAS_FINDINGS: ${{ needs.consolidate.outputs.has_findings }}
        run: |
          # Failure modes: any upstream job whose result isn't `success` fails the
          # check. That covers failure, skipped, and cancelled in one check —
          # e.g., consolidate was skipped because review was skipped, or the
          # consolidate script itself exited non-zero (failing the step and job).
          if [ "$SETUP_RESULT" != "success" ] \
             || [ "$REVIEW_RESULT" != "success" ] \
             || [ "$CONSOLIDATE_RESULT" != "success" ]; then
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
            echo "summary=Fleet run failed. See workflow logs." >> "$GITHUB_OUTPUT"
          elif [ "$HAS_FINDINGS" = "true" ]; then
            echo "conclusion=neutral" >> "$GITHUB_OUTPUT"
            echo "summary=Findings posted to the PR comment." >> "$GITHUB_OUTPUT"
          else
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            echo "summary=No issues found across the reviewer fleet." >> "$GITHUB_OUTPUT"
          fi

      - name: Finalize check run
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # ratchet:LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          check_id: ${{ needs.setup.outputs.check_run_id }}
          status: "completed"
          conclusion: ${{ steps.conclusion.outputs.conclusion }}
          output: |
            {"title": "Fleet Review", "summary": "${{ steps.conclusion.outputs.summary }}"}
